name: Refresh market quotes

on:
  # Every 3 hours on the hour. Quotes are fast (~1 min).
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Fetch market quotes
        run: python update_quotes.py

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quotes.json
          if git diff --cached --quiet; then
            echo "No quote changes to commit."
          else
            git commit -m "Refresh quotes ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
